name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  signed-dmg:
    name: Signed Notarized DMG
    runs-on: macos-26

    env:
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
      CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD }}
      WIRETAP_SIGN_IDENTITY: ${{ secrets.WIRETAP_SIGN_IDENTITY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate release secrets
        run: |
          : "${APPLE_APP_SPECIFIC_PASSWORD:?Set APPLE_APP_SPECIFIC_PASSWORD}"
          : "${APPLE_ID:?Set APPLE_ID}"
          : "${APPLE_TEAM_ID:?Set APPLE_TEAM_ID}"
          : "${CERTIFICATE_BASE64:?Set DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64}"
          : "${CERTIFICATE_PASSWORD:?Set DEVELOPER_ID_APPLICATION_CERTIFICATE_PASSWORD}"
          : "${WIRETAP_SIGN_IDENTITY:?Set WIRETAP_SIGN_IDENTITY}"

      - name: Import Developer ID certificate
        run: |
          KEYCHAIN_PASSWORD="$(uuidgen)"
          KEYCHAIN_PATH="$RUNNER_TEMP/wiretap-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" "$HOME/Library/Keychains/login.keychain-db"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

      - name: Check tag matches app version
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Packaging/Info.plist)"
          EXPECTED_TAG="v$VERSION"
          if [[ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match app version $EXPECTED_TAG"
            exit 1
          fi

      - name: Run tests
        run: swift test

      - name: Build signed notarized DMG
        run: WIRETAP_NOTARIZE=1 Scripts/package-dmg.sh release

      - name: Verify signed notarized artifact
        run: |
          WIRETAP_VERIFY_SKIP_TESTS=1 \
          WIRETAP_VERIFY_SKIP_BUILD=1 \
          WIRETAP_VERIFY_REQUIRE_NOTARIZATION=1 \
          Scripts/verify-release.sh release

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Packaging/Info.plist)"
          DMG_PATH=".build/dist/Wiretap-$VERSION.dmg"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$DMG_PATH" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$DMG_PATH" \
              --title "Wiretap $VERSION" \
              --notes "Signed and notarized Wiretap $VERSION DMG."
          fi

      - name: Delete temporary keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH" || true
