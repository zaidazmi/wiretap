name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    name: Test and Package
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Build verified DMG
        run: Scripts/package-dmg.sh debug

      - name: Verify packaged artifact
        run: |
          WIRETAP_VERIFY_SKIP_TESTS=1 \
          WIRETAP_VERIFY_SKIP_BUILD=1 \
          Scripts/verify-release.sh debug
